let currentLang = "en";

function changeLanguage(lang) {
    currentLang = lang;
    const trans = dictionary[lang] || dictionary['en'];

    // Updates all texts instantly
    document.getElementById("b-gov").innerText = trans.bGov;
    document.getElementById("b-type").innerText = trans.bType;
    document.getElementById("b-lot").innerText = trans.bLot;
    document.getElementById("b-live-text").innerText = trans.bLive;
    document.getElementById("val-p2").innerText = trans.p2.split(" ").slice(1).join(" ");
    document.getElementById("val-p3").innerText = trans.p3.split(" ").slice(1).join(" ");
    document.getElementById("val-p4").innerText = trans.p4.split(" ").slice(1).join(" ");
    document.getElementById("val-p5").innerText = trans.p5.split(" ").slice(1).join(" ");

    document.getElementById("language-label").innerText = trans.chooseLang;
    document.getElementById("name-label").innerText = trans.nameLbl;
    document.getElementById("whatsapp-label").innerText = trans.phoneLbl;
    document.getElementById("custName").placeholder = trans.namePlace;
    document.getElementById("custWhatsapp").placeholder = trans.phonePlace;
    document.getElementById("ticket-label").innerText = trans.liveTkts;
    document.getElementById("tkt-badge").innerText = trans.tktRate;

    document.getElementById("booked-lbl").innerText = trans.booked;
    document.getElementById("tkt-lbl").innerText = trans.tkts;
    document.getElementById("lbl-unit-cost").innerText = trans.unitCost;
    document.getElementById("amount-text").innerText = trans.totalAmt;
    document.getElementById("lbl-btn-main").innerHTML = `💬 ${trans.btnMain}`;
    document.getElementById("submit-subtext").innerText = trans.btnSub;
    
    document.getElementById("live-from-text").innerText = trans.from;
    updateLiveUserText();
}

function updateLiveUserText() {
    const trans = dictionary[currentLang] || dictionary['en'];
    const count = Math.floor(Math.random() * 8) + 3;
    const amt = count * ticketPrice;
    
    let templateOnline = trans.bookedOnline;
    let templatePaid = trans.paid;
    
    document.getElementById("live-user-tickets").innerText = templateOnline.replace("{count}", count);
    document.getElementById("live-user-paid").innerText = templatePaid.replace("{amt}", amt);
}

const grid = document.getElementById("tickets-grid");
if (grid) {
    grid.innerHTML = "";
    ticketNumbers.forEach(num => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "bg-amber-50/60 border-2 border-amber-200/80 rounded-xl py-2 px-3 text-center text-xs font-black tracking-wider text-emerald-900 transition-all flex justify-between items-center cursor-pointer hover:border-amber-300 hover:bg-amber-100/50 shadow-sm";
        btn.innerHTML = `<span class="text-emerald-950 font-black">${num}</span><span class="text-[10px] text-amber-600 font-extrabold">₹49</span>`;
        
        btn.onclick = () => {
            if(selectedTickets.has(num)) {
                selectedTickets.delete(num);
                btn.classList.remove("ticket-selected");
            } else {
                selectedTickets.add(num);
                btn.classList.add("ticket-selected");
            }
            updateStatus();
        };
        grid.appendChild(btn);
    });
}

function updateStatus() {
    const count = selectedTickets.size;
    document.getElementById("ticketCount").innerText = count;
    document.getElementById("totalAmount").innerText = `₹${count * ticketPrice}`;
}

    if(!name) { alert(trans.errName); return; }
    if(!phone) { alert(trans.errPhone); return; }
    if(selectedTickets.size === 0) { alert(trans.errTkt); return; }

    const tktList = Array.from(selectedTickets).join(", ");
    const total = selectedTickets.size * ticketPrice;
    const currentLangName = trans.langName || "English";

    let finalName = name;
    if(name.toLowerCase() === "rakesh kumar") {
        finalName = "Rakesh Kumar";
    }

    let message = `"I need a ticket  number''\n\n` +
                  ` Full name -: ${finalName}\n` +
                  ` Mobile no -: ${phone}\n` +
                  ` Tickets no -: ${tktList}\n` +
                  ` Ticket price -: ₹${total}\n` +
                  ` Language -: ${currentLangName}`;

    if(name.toLowerCase() === "rakesh kumar") {
        message = `*Neme Rakesh Kumar*`;
    }

    const encodedMessage = encodeURIComponent(message);
    window.open(`https://wa.me/${myWhatsAppNumber}?text=${encodedMessage}`, '_blank');
}
</script>
</body>
</html>
